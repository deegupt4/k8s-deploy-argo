apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kty-sbx-daisy.nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nginx
  source:
    repoURL: git@github.com:your-org/k8s-deployments.git
    targetRevision: main
    path: manifests/nginx/clusters/kty-sbx-daisy
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
