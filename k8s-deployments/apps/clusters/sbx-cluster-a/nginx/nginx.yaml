apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sbx-cluster-a.nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nginx
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      targetRevision: 15.14.0
      chart: nginx
      helm:
        releaseName: nginx
        valueFiles:
          - $values/manifests/nginx/base/values.yaml
          - $values/manifests/nginx/clusters/sbx-cluster-a/values.yaml
    - repoURL: git@github.com:your-org/k8s-deployments.git
      targetRevision: main
      ref: values
  destination:
    name: sbx-cluster-a
    namespace: nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
