---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-manager
  namespace: argocd
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-manager-token
  namespace: argocd
  annotations:
    kubernetes.io/service-account.name: argocd-manager
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-manager-list-role
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - list
      - watch
  - nonResourceURLs:
      - '*'
    verbs:
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-manager-list-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-manager-list-role
subjects:
  - kind: ServiceAccount
    name: argocd-manager
    namespace: argocd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-manager-kcp
  namespace: argocd
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-manager-kcp-token
  namespace: argocd
  annotations:
    kubernetes.io/service-account.name: argocd-manager-kcp
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-manager-kcp-role
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
  - nonResourceURLs:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-manager-kcp-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-manager-kcp-role
subjects:
  - kind: ServiceAccount
    name: argocd-manager-kcp
    namespace: argocd
