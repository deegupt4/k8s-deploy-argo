apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Infrastructure applications (cert-manager, external-secrets, etc.)
  sourceRepos:
    - '*'
  destinations:
    - namespace: cert-manager
      server: '*'
    - namespace: external-secrets
      server: '*'
    - namespace: kube-system
      server: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  roles:
    - name: admin
      description: Admin access to infra apps
      policies:
        - p, proj:infra:admin, applications, *, infra/*, allow
      groups:
        - platform-team
