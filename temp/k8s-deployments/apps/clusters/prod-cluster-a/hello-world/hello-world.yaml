apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-cluster-a.hello-world
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hello-world
  source:
    repoURL: git@github.com:your-org/k8s-deployments.git
    targetRevision: main
    path: manifests/hello-world/clusters/prod-cluster-a
  destination:
    name: prod-cluster-a
    namespace: hello-world
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
