apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sbx-cluster-a.infra-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '-2'
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: sbx-cluster-a
    namespace: argocd
  source:
    path: infra-apps/clusters/sbx-cluster-a
    repoURL: git@github.com:your-org/k8s-deployments.git
    targetRevision: main
  project: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
